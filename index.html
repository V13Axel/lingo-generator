<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Lingo Generator</title>
    <style>
      [x-cloak] { display: none !important; }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fade-in 150ms ease-out; }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <main
      x-data="lingoApp"
      x-cloak
      class="relative mx-auto max-w-5xl p-4 sm:p-6 flex flex-col md:flex-row gap-6"
    >
      <!-- Utility icons: pinned to top-right of the page so they stay out
           of the way of the sidebar on desktop and the results list on
           mobile (where the sidebar otherwise stacks above the results). -->
      <div class="absolute top-4 right-4 sm:top-6 sm:right-6 z-10 flex items-center gap-1">
        <!-- GitHub -->
        <a
          class="inline-flex items-center justify-center w-8 h-8 rounded
                 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200
                 hover:bg-slate-200/60 dark:hover:bg-slate-700/60 transition-colors
                 focus:outline-none focus-visible:ring-2 ring-accent"
          href="https://github.com/V13Axel/lingo-generator" target="_blank" rel="noopener noreferrer"
          aria-label="View source on GitHub"
          title="View source on GitHub"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98 96" class="w-5 h-5" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" fill="currentColor"
                  d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.172 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.42-7.17-5.42-7.17-4.448-3.015.324-3.015.324-3.015 4.934.326 7.523 5.052 7.523 5.052 4.367 7.496 11.404 5.378 14.235 4.074.404-3.178 1.699-5.378 3.074-6.6-10.839-1.141-22.243-5.378-22.243-24.283 0-5.378 1.94-9.778 5.014-13.2-.485-1.222-2.184-6.275.486-13.038 0 0 4.125-1.304 13.426 5.052a46.97 46.97 0 0 1 12.214-1.63c4.125 0 8.33.571 12.213 1.63 9.302-6.356 13.427-5.052 13.427-5.052 2.67 6.763.97 11.816.485 13.038 3.155 3.422 5.015 7.822 5.015 13.2 0 18.905-11.404 23.06-22.324 24.283 1.78 1.548 3.316 4.481 3.316 9.126 0 6.6-.08 11.897-.08 13.526 0 1.304.89 2.853 3.316 2.364 19.412-6.52 33.405-24.935 33.405-46.691C97.707 22 75.788 0 48.854 0z" />
          </svg>
        </a>

        <!-- Theme toggle -->
        <button
          type="button"
          class="inline-flex items-center justify-center w-8 h-8 rounded cursor-pointer
                 text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200
                 hover:bg-slate-200/60 dark:hover:bg-slate-700/60 transition-colors
                 focus:outline-none focus-visible:ring-2 ring-accent"
          @click="cycleTheme()"
          :aria-label="'Theme: ' + themeLabel + ' (click for ' + nextThemeLabel + ')'"
          :title="'Theme: ' + themeLabel + ' (click for ' + nextThemeLabel + ')'"
        >
          <svg x-show="theme === 'system'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.5" stroke="currentColor" class="w-5 h-5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 17.25v1.007a3 3 0 0 1-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0 1 15 18.257V17.25m6-12V15a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 15V5.25m18 0A2.25 2.25 0 0 0 18.75 3H5.25A2.25 2.25 0 0 0 3 5.25m18 0V12a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 12V5.25" />
          </svg>
          <svg x-show="theme === 'light'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.5" stroke="currentColor" class="w-5 h-5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
          </svg>
          <svg x-show="theme === 'dark'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
               stroke-width="1.5" stroke="currentColor" class="w-5 h-5" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        </button>
      </div>

      <!-- Sidebar -->
      <aside class="md:w-64 shrink-0 space-y-4">
        <header class="pr-28 md:pr-0">
           <h1 class="text-xl font-bold">Lingo Generator</h1>
           <p class="text-sm text-slate-500 dark:text-slate-400">
             For when you're out of ideas to make your Miis sound silly.
           </p>
         </header>

        <fieldset class="space-y-2">
          <legend class="text-sm font-semibold mb-3">Generate…</legend>

          <button
            class="category-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700
                   disabled:opacity-50 disabled:cursor-not-allowed"
            :disabled="!canSuggest"
            @click="suggestCategory('person')"
          >
            <span>A person</span>
          </button>
          <button
            class="category-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700
                   disabled:opacity-50 disabled:cursor-not-allowed"
            :disabled="!canSuggest"
            @click="suggestCategory('item')"
          >
            <span>An item</span>
          </button>
          <button
            class="category-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700
                   disabled:opacity-50 disabled:cursor-not-allowed"
            :disabled="!canSuggest"
            @click="suggestCategory('activity')"
          >
            <span>An activity</span>
          </button>
          <button
            class="category-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700
                   disabled:opacity-50 disabled:cursor-not-allowed"
            :disabled="!canSuggest"
            @click="suggestCategory('something-else')"
          >
            <span>Something else</span>
          </button>
        </fieldset>

        <hr class="border-slate-200 dark:border-slate-700 my-4" />

        <div>
          <button
            class="w-full bg-accent text-accent-fg px-4 py-2 rounded font-medium
                   cursor-pointer transition-all
                   hover:-translate-y-px hover:brightness-110
                   disabled:opacity-50 disabled:cursor-not-allowed
                   disabled:hover:translate-y-0 disabled:hover:brightness-100
                   focus:outline-none focus-visible:ring-2 ring-accent
                   focus-visible:ring-offset-2 ring-offset-slate-50
                   dark:ring-offset-slate-900"
            :disabled="!canSuggest"
            @click="suggest()"
            x-text="loading ? 'Loading…' : 'Surprise me'"
          ></button>
        </div>

      </aside>

      <!-- Main -->
      <!-- md:pt-10 reserves vertical space for the absolutely-positioned
           utility icons (top-right) so they don't overlap the first result
           row on desktop. On mobile the icons sit in the top-right of the
           sidebar header area, so no top padding is needed here. -->
      <section class="flex-1 min-w-0 md:pt-10">
        <p x-show="loading" class="text-slate-500 dark:text-slate-400">Loading word lists…</p>
        <p x-show="error" x-text="error" class="text-red-600 dark:text-red-400"></p>

        <ul
          x-show="!loading && !error && history.length > 0"
          aria-live="polite"
          class="space-y-2"
        >
          <template x-for="(item, idx) in history" :key="item.id">
            <li
              class="flex items-baseline justify-between gap-4 p-2 rounded
                     bg-white dark:bg-slate-800 shadow-sm cursor-pointer group"
              :class="idx === 0 ? 'fade-in' : ''"
              @click="copyToClipboard(item.phrase)"
            >
              <span x-text="item.phrase" class="break-words"></span>
              <span class="text-xs text-slate-500 dark:text-slate-400 shrink-0">
                <span class="group-hover:hidden" x-text="categoryLabel(item.category)"></span>
                <span class="hidden group-hover:inline text-accent">Click to copy</span>
              </span>
            </li>
          </template>
        </ul>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
