<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Lingo Generator</title>
    <style>
      [x-cloak] { display: none !important; }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(-4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in { animation: fade-in 150ms ease-out; }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <main
      x-data="lingoApp"
      x-cloak
      class="mx-auto max-w-5xl p-4 sm:p-6 flex flex-col md:flex-row gap-6"
    >
      <!-- Sidebar -->
      <aside class="md:w-64 shrink-0 space-y-4">
        <header>
           <h1 class="text-xl font-bold">Lingo Generator</h1>
           <p class="text-sm text-slate-500 dark:text-slate-400">
             For when you're out of ideas to make your Miis sound silly.
           </p>
         </header>

        <fieldset class="space-y-2">
          <legend class="text-sm font-semibold mb-3 w-full flex justify-between items-center">
            <span class="flex-1">Categories</span>
            <button
              class="text-xs px-2 py-1 rounded border text-slate-600 dark:text-slate-300
                     bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700
                     hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shrink-0"
              @click="toggleAll()"
              x-text="allCategoriesChecked ? 'Disable all' : 'Enable all'"
            ></button>
          </legend>

          <button
            class="toggle-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   dark:border-slate-700 dark:text-slate-100"
            :class="categories.person ? 'bg-accent text-accent-fg border-accent' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700'"
            @click="categories.person = !categories.person"
          >
            <span>A person</span>
          </button>
          <button
            class="toggle-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   dark:border-slate-700 dark:text-slate-100"
            :class="categories.item ? 'bg-accent text-accent-fg border-accent' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700'"
            @click="categories.item = !categories.item"
          >
            <span>An item</span>
          </button>
          <button
            class="toggle-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   dark:border-slate-700 dark:text-slate-100"
            :class="categories.activity ? 'bg-accent text-accent-fg border-accent' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700'"
            @click="categories.activity = !categories.activity"
          >
            <span>An activity</span>
          </button>
          <button
            class="toggle-btn w-full text-left px-3 py-2 rounded border text-sm
                   flex items-center gap-2
                   dark:border-slate-700 dark:text-slate-100"
            :class="categories['something-else'] ? 'bg-accent text-accent-fg border-accent' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700'"
            @click="categories['something-else'] = !categories['something-else']"
          >
            <span>Something else</span>
          </button>
        </fieldset>

        <hr class="border-slate-200 dark:border-slate-700 my-4" />

        <div class="space-y-2">
          <button
            class="w-full bg-accent text-accent-fg px-4 py-2 rounded font-medium
                   disabled:opacity-50 disabled:cursor-not-allowed
                   focus:outline-none focus-visible:ring-2 ring-accent
                   focus-visible:ring-offset-2 ring-offset-slate-50
                   dark:ring-offset-slate-900"
            :disabled="!canSuggest"
            @click="suggest()"
            x-text="loading ? 'Loading…' : 'Suggest'"
          ></button>
          <p
            x-show="!loading && !error && !anyCategoryChecked"
            class="text-xs text-slate-500 dark:text-slate-400"
          >Pick at least one category.</p>
        </div>

        <div>
          <button
            class="text-xs text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 underline"
            @click="clearHistory()"
          >Clear history</button>
        </div>

        <footer class="text-xs text-slate-400 pt-4">
          <a
            class="hover:text-slate-600 dark:hover:text-slate-300 underline"
             href="https://github.com/V13Axel/lingo-generator" target="_blank" rel="noopener noreferrer"
          >GitHub</a>
        </footer>
      </aside>

      <!-- Main -->
      <section class="flex-1 min-w-0">
        <p x-show="loading" class="text-slate-500 dark:text-slate-400">Loading word lists…</p>
        <p x-show="error" x-text="error" class="text-red-600 dark:text-red-400"></p>

        <div
          x-show="!loading && !error && history.length === 0"
          class="text-slate-500 dark:text-slate-400"
        >
          Pick one or more categories, then click Suggest.
        </div>

        <ul
          x-show="!loading && !error && history.length > 0"
          aria-live="polite"
          class="space-y-2"
        >
          <template x-for="(item, idx) in history" :key="item.id">
            <li
              class="flex items-baseline justify-between gap-4 p-2 rounded
                     bg-white dark:bg-slate-800 shadow-sm cursor-pointer group"
              :class="idx === 0 ? 'fade-in' : ''"
              @click="copyToClipboard(item.phrase)"
            >
              <span x-text="item.phrase" class="break-words"></span>
              <span class="text-xs text-slate-500 dark:text-slate-400 shrink-0">
                <span class="group-hover:hidden" x-text="'· ' + categoryLabel(item.category)"></span>
                <span class="hidden group-hover:inline text-accent">Click to copy</span>
              </span>
            </li>
          </template>
        </ul>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
